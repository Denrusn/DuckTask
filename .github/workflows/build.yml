name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4
          cache-read-only: false

      - name: Clean build
        run: gradle clean --no-daemon

      - name: Run Unit Tests
        id: unit_tests
        continue-on-error: true
        run: |
          set -o pipefail
          log_file=$(mktemp)
          if gradle testDebugUnitTest --no-daemon 2>&1 | tee "$log_file"; then
            exit 0
          fi

          if grep -En 'e: |error:|FAILURE:|What went wrong|Execution failed|Caused by:' "$log_file" >/tmp/unit-test-errors.txt; then
            tail -n 20 /tmp/unit-test-errors.txt | while IFS= read -r line; do
              echo "::error::${line}"
            done
          else
            tail -n 40 "$log_file" | while IFS= read -r line; do
              echo "::error::${line}"
            done
          fi

          exit 1

      - name: Summarize Unit Test Failures
        if: always()
        run: |
          shopt -s nullglob
          failure_count=0
          for file in app/build/test-results/testDebugUnitTest/*.xml; do
            if grep -Eq '<failure|<error' "$file"; then
              suite=$(basename "$file" .xml)
              echo "::error::Failed unit test suite: ${suite}"
              failure_count=$((failure_count + 1))
            fi
          done
          if [ "$failure_count" -gt 0 ]; then
            echo "Detected ${failure_count} failed unit test suite(s)."
          fi

      - name: Fail If Unit Tests Failed
        if: steps.unit_tests.outcome == 'failure'
        run: exit 1

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DuckTask-debug.apk
          path: app/build/outputs/apk/debug/*.apk
