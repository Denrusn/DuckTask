name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.4
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build dev flavor with Gradle
        run: ./gradlew assembleDevDebug --no-daemon

      - name: Upload dev APK
        uses: actions/upload-artifact@v4
        with:
          name: DuckTask-dev-debug
          path: app/build/outputs/apk/dev/debug/app-dev-debug.apk

      - name: Build prod flavor with Gradle
        run: ./gradlew assembleProdDebug --no-daemon

      - name: Upload prod APK (小鸭任务)
        uses: actions/upload-artifact@v4
        with:
          name: 小鸭任务-prod-debug
          path: app/build/outputs/apk/prod/debug/app-prod-debug.apk
